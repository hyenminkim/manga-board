<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<script th:unless="${post}">
    alert("해당 정보가 삭제되거나 없습니다");
    history.back();
</script>

<th:block th:if="${post}" th:with="logged_member=${#authentication.principal.member}">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" type="text/css" th:href="@{/css/common.css}">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
        <script th:inline="javascript">
            const logged_id = [[${logged_member.id}]];
        </script>
        <script th:src="@{/js/detail.js}"></script>
        <title>조회 - [[${post.subject}]]</title>
        <style>
            .detail-page { max-width: 800px; margin: 0 auto; padding: 32px 24px 60px; }
            .detail-card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); overflow: hidden; }
            .detail-card-header { padding: 28px 28px 20px; border-bottom: 1px solid var(--color-border); }
            .detail-card-header h1 { font-size: 24px; font-weight: 800; margin: 0 0 12px; color: var(--color-text); line-height: 1.4; }
            .detail-meta { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--color-text-muted); flex-wrap: wrap; }
            .detail-meta span { display: flex; align-items: center; gap: 4px; }
            .detail-meta i { font-size: 12px; }
            .detail-card-body { padding: 28px; min-height: 200px; font-size: 15px; line-height: 1.8; color: var(--color-text); }
            .detail-card-body img { max-width: 100%; border-radius: var(--radius-md); }
            .detail-attachments { margin: 0; padding: 20px 28px; border-top: 1px solid var(--color-border); background: var(--color-light); }
            .detail-attachments label { font-size: 13px; font-weight: 700; color: var(--color-text-muted); margin-bottom: 8px; display: block; width: auto; }
            .detail-attachments ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
            .detail-attachments li a { font-size: 14px; color: var(--color-primary); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
            .detail-attachments li a:hover { text-decoration: underline; }
            .detail-attachments .img-thumbnail { max-width: 300px; border-radius: var(--radius-md); margin-top: 8px; }
            .detail-buttons { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
            .detail-buttons a, .detail-buttons button { padding: 10px 20px; border-radius: var(--radius-full); font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; transition: all 0.2s; font-family: inherit; border: none; }
            .btn-dt-primary { background: var(--color-primary-gradient); color: #fff; box-shadow: 0 2px 8px rgba(13,104,50,0.2); }
            .btn-dt-primary:hover { transform: translateY(-1px); color: #fff; }
            .btn-dt-outline { background: #fff; color: var(--color-text); border: 2px solid var(--color-border) !important; }
            .btn-dt-outline:hover { border-color: var(--color-primary) !important; color: var(--color-primary); }
            .btn-dt-danger { background: var(--color-danger); color: #fff; }
            .btn-dt-danger:hover { background: var(--color-danger-hover); }
            @media (max-width: 768px) {
                .detail-page { padding: 16px 16px 40px; }
                .detail-card-header, .detail-card-body, .detail-attachments { padding-left: 20px; padding-right: 20px; }
                .detail-card-header h1 { font-size: 20px; }
            }
        </style>
    </head>
    <body>
    <th:block th:insert="~{common/header::header}"></th:block>

    <div class="detail-page">
        <div class="detail-card">
            <div class="detail-card-header">
                <h1 th:text="${post.subject}"></h1>
                <div class="detail-meta">
                    <span><i class="fas fa-user"></i> [[${post.member.username}]]</span>
                    <span><i class="fas fa-calendar"></i> [[${#temporals.format(post.regDate, 'yyyy-MM-dd HH:mm')}]]</span>
                    <span><i class="fas fa-eye"></i> [[${post.viewCnt}]]</span>
                </div>
            </div>
            <div class="detail-card-body" th:utext="${post.content}"></div>

            <div class="detail-attachments" th:if="${!post.fileList.isEmpty()}">
                <label><i class="fas fa-paperclip"></i> 첨부파일</label>
                <ul>
                    <li th:each="attachment : ${post.fileList}">
                        <a th:href="@{/board/download(id=${attachment.id})}">
                            <i class="fas fa-file-download"></i> <span th:text="${attachment.sourcename}"></span>
                        </a>
                    </li>
                </ul>
                <div th:each="attachment : ${post.fileList}" th:if="${attachment.image}">
                    <img th:src="@{'/upload/' + ${attachment.filename}}" class="img-thumbnail" alt="">
                </div>
            </div>
        </div>

        <form name="frmDelete" th:action="@{/board/delete}" method="post">
            <input type="hidden" name="id" th:value="${post.id}">
        </form>

        <div class="detail-buttons">
            <a class="btn-dt-primary" th:href="@{'/board/update/' + ${post.id}}" th:if="${logged_member.id == post.member.id}"><i class="fas fa-edit"></i> 수정</a>
            <a class="btn-dt-outline" th:href="@{/board/list(page=${session.page})}"><i class="fas fa-list"></i> 목록</a>
            <button type="button" class="btn-dt-danger" id="btnDel" th:if="${logged_member.id == post.member.id}"><i class="fas fa-trash"></i> 삭제</button>
            <a class="btn-dt-outline" th:href="@{/board/write}" sec:authorize="hasAnyRole('MEMBER', 'ADMIN')"><i class="fas fa-pen"></i> 작성</a>
        </div>

        <th:block th:insert="~{board/comment::comment}"></th:block>
    </div>

    </body>
</th:block>
</html>
