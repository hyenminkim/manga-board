<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${manga.title} + ' - 상세 정보'">만화 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" th:href="@{/css/common.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/manga_detail.css}">
</head>
<body>
<th:block th:insert="~{common/header::header}"></th:block>

<!-- Breadcrumb -->
<nav class="breadcrumb-bar">
    <div class="breadcrumb-inner">
        <a th:href="@{/managa/list}"><i class="fas fa-home"></i></a>
        <i class="fas fa-chevron-right"></i>
        <a th:href="@{/managa/list}">만화 아카이브</a>
        <i class="fas fa-chevron-right"></i>
        <span th:text="${manga.title}">제목</span>
    </div>
</nav>

<div class="detail-wrapper">
    <!-- 상단: 커버 + 정보 -->
    <div class="detail-hero">
        <!-- 배경 블러 -->
        <div class="detail-hero__bg">
            <img th:src="${manga.imageDownloadUrl}" alt="" />
        </div>

        <div class="detail-hero__content">
            <div class="detail-cover">
                <img th:src="${manga.imageDownloadUrl}" th:alt="${manga.title}"
                     onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'" />
            </div>

            <div class="detail-info">
                <div class="detail-info__header">
                    <span class="genre-badge" th:if="${manga.mainGenreCdNm != null && manga.mainGenreCdNm != ''}"
                          th:text="${manga.mainGenreCdNm}"></span>
                    <span class="age-badge" th:if="${manga.ageGradCdNm != null && manga.ageGradCdNm != ''}"
                          th:text="${manga.ageGradCdNm}"></span>
                    <span class="age-badge" th:if="${(manga.ageGradCdNm == null || manga.ageGradCdNm == '') && manga.originClCdNm != null && manga.originClCdNm != ''}"
                          th:text="${manga.originClCdNm}"></span>
                </div>

                <h1 class="detail-title" th:text="${manga.title}"></h1>
                <p class="detail-subtitle" th:if="${manga.subtitl != null && manga.subtitl != ''}" th:text="${manga.subtitl}"></p>
                <p class="detail-original" th:if="${manga.orginlTitle != null && manga.orginlTitle != ''}">
                    <i class="fas fa-globe"></i> 원작: <span th:text="${manga.orginlTitle}"></span>
                </p>

                <div class="detail-meta-grid">
                    <div class="meta-item" th:if="${manga.pictrWritrNm != null && manga.pictrWritrNm != ''}">
                        <div class="meta-icon"><i class="fas fa-paint-brush"></i></div>
                        <div class="meta-text">
                            <span class="meta-label">그림</span>
                            <span class="meta-value" th:text="${manga.pictrWritrNm}"></span>
                        </div>
                    </div>
                    <div class="meta-item" th:if="${manga.sntncWritrNm != null && manga.sntncWritrNm != ''}">
                        <div class="meta-icon"><i class="fas fa-pen-nib"></i></div>
                        <div class="meta-text">
                            <span class="meta-label">글</span>
                            <span class="meta-value" th:text="${manga.sntncWritrNm}"></span>
                        </div>
                    </div>
                    <div class="meta-item" th:if="${manga.plscmpnIdNm != null && manga.plscmpnIdNm != ''}">
                        <div class="meta-icon"><i class="fas fa-building"></i></div>
                        <div class="meta-text">
                            <span class="meta-label">출판사</span>
                            <span class="meta-value" th:text="${manga.plscmpnIdNm}"></span>
                        </div>
                    </div>
                    <div class="meta-item" th:if="${manga.pltfomCdNm != null && manga.pltfomCdNm != ''}">
                        <div class="meta-icon"><i class="fas fa-desktop"></i></div>
                        <div class="meta-text">
                            <span class="meta-label">플랫폼</span>
                            <span class="meta-value" th:text="${manga.pltfomCdNm}"></span>
                        </div>
                    </div>
                    <div class="meta-item" th:if="${manga.isbn != null && manga.isbn != ''}">
                        <div class="meta-icon"><i class="fas fa-barcode"></i></div>
                        <div class="meta-text">
                            <span class="meta-label">ISBN</span>
                            <span class="meta-value" th:text="${manga.isbn}"></span>
                        </div>
                    </div>
                    <div class="meta-item" th:if="${manga.edtn != null && manga.edtn != ''}">
                        <div class="meta-icon"><i class="fas fa-layer-group"></i></div>
                        <div class="meta-text">
                            <span class="meta-label">에디션</span>
                            <span class="meta-value" th:text="${manga.edtn}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 줄거리 -->
    <div class="detail-section" th:if="${manga.outline != null && manga.outline != ''}">
        <div class="section-header">
            <i class="fas fa-book-open"></i>
            <h2>줄거리</h2>
        </div>
        <div class="section-body">
            <p class="outline-text" th:text="${manga.outline}"></p>
        </div>
    </div>

    <!-- 버튼 -->
    <div class="detail-actions">
        <a th:href="@{/managa/list}" class="btn-back">
            <i class="fas fa-arrow-left"></i> 목록으로 돌아가기
        </a>
    </div>
</div>

</body>
</html>
