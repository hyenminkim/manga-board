<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<th:block th:fragment="header">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/common.js}"></script>
    <script src="/webjars/sockjs-client/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet"/>
    <link rel="stylesheet" type="text/css" th:href="@{/css/common.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/header.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/notification.css}">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
    <script th:src="@{/js/chat.js}"></script>

    <nav class="header-nav" id="headerNav">
        <div class="header-inner">
            <!-- Logo -->
            <div class="header-logo">
                <a th:href="@{/managa/list}">Managa</a>
            </div>

            <!-- Hamburger button for mobile -->
            <button class="header-hamburger" id="headerHamburger" aria-label="메뉴 열기">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <!-- Navigation links -->
            <ul class="header-menu" id="headerMenu">
                <li class="header-search">
                    <form action="/managa/list">
                        <input type="text" id="keyword" name="keyword" placeholder="제목을 입력해주세요.">
                    </form>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <a href="#" data-bs-toggle="modal" data-bs-target="#chatCreateModal">채팅방 생성</a>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <a th:href="@{/chat/list}">채팅방 참여</a>
                </li>
                <li>
                    <a th:href="@{/managa/notice}">공지사항</a>
                </li>
                <li>
                    <a th:href="@{/board/list}">게시글 목록</a>
                </li>

                <!-- Profile dropdown -->
                <li class="header-profile" id="headerProfile">
                    <button class="header-profile-btn" id="profileToggle" type="button" aria-expanded="false">
                        <img width="32" height="32"
                             src="https://img.icons8.com/fluency-systems-regular/48/user-male-circle--v1.png"
                             alt="profile"/>
                    </button>
                    <ul class="header-dropdown" id="profileDropdown">
                        <li sec:authorize="isAnonymous()">
                            <a th:href="@{/user/login}">로그인</a>
                        </li>
                        <li sec:authorize="isAuthenticated()">
                            <a th:href="@{/mypage/home}">마이페이지</a>
                        </li>
                        <li sec:authorize="isAuthenticated()">
                            <form th:action="@{/user/logout}" method="POST">
                                <button class="btn-logout" type="submit">로그아웃</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Chat Create Modal (outside nav) -->
    <div class="modal fade" id="chatCreateModal" sec:authorize="isAuthenticated()" tabindex="-1"
         aria-labelledby="chatCreateModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="chatCreateModalLabel">채팅방 생성</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
                </div>
                <div class="modal-body">
                    <form id="chatCreateForm">
                        <div class="mb-3">
                            <label for="title" class="form-label">채팅방 제목</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                            <input type="hidden" class="form-control" id="member_id" name="member_id"
                                   th:value="${#authentication.getPrincipal().getMember().id}" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="createChatBtn">생성</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Header JS -->
    <script>
        $(function () {
            // Click-based profile dropdown
            $('#profileToggle').on('click', function (e) {
                e.stopPropagation();
                var $dropdown = $('#profileDropdown');
                var isOpen = $dropdown.hasClass('open');
                $dropdown.toggleClass('open');
                $(this).attr('aria-expanded', !isOpen);
            });

            // Close dropdown when clicking outside
            $(document).on('click', function () {
                $('#profileDropdown').removeClass('open');
                $('#profileToggle').attr('aria-expanded', 'false');
            });

            // Hamburger menu toggle
            $('#headerHamburger').on('click', function () {
                $(this).toggleClass('active');
                $('#headerMenu').toggleClass('open');
            });
        });
    </script>

</th:block>

</html>
