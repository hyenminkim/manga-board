<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script th:src="@{/js/register.js}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" th:href="@{/css/common.css}">
    <title>회원가입</title>
    <style>
        .register-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f0 100%);
            padding: 20px;
        }
        .register-card {
            width: 100%;
            max-width: 480px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            padding: 48px 40px;
        }
        .register-logo {
            text-align: center;
            margin-bottom: 8px;
        }
        .register-logo a {
            font-size: 32px;
            font-weight: 900;
            color: var(--color-primary);
            text-decoration: none;
        }
        .register-desc {
            text-align: center;
            color: var(--color-text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .register-card .form-group {
            margin-bottom: 18px;
        }
        .register-card label {
            font-size: 13px;
            font-weight: 700;
            color: var(--color-text-secondary);
            margin-bottom: 6px;
            display: block;
            width: auto;
        }
        .register-card input[type="text"],
        .register-card input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--color-border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: var(--color-bg-input);
            transition: all 0.25s ease;
            outline: none;
        }
        .register-card input:focus {
            border-color: var(--color-primary);
            background: #fff;
            box-shadow: 0 0 0 4px var(--color-primary-light);
        }
        .register-card #label1,
        .register-card #password_check {
            font-size: 12px;
            margin-top: 4px;
            display: block;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--color-primary-gradient);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(13,104,50,0.2);
            margin-top: 8px;
        }
        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(13,104,50,0.3);
        }
        .register-error {
            color: var(--color-danger);
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .register-login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--color-text-muted);
        }
        .register-login-link a {
            color: var(--color-primary);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="register-page">
    <div class="register-card">
        <div class="register-logo">
            <a th:href="@{/managa/list}">Managa</a>
        </div>
        <p class="register-desc">회원가입 후 다양한 서비스를 이용하세요</p>

        <div class="register-error" th:if="${error}" th:text="${error}"></div>

        <form method="POST" th:action="@{/user/register}" name="registerForm" id="registerForm">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" placeholder="사용할 아이디" th:value="${username}">
                <label id="label1"></label>
            </div>
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" placeholder="이름을 입력하세요" th:value="${name}">
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호">
            </div>
            <div class="form-group">
                <label for="re_password">비밀번호 확인</label>
                <input type="password" id="re_password" name="re_password" placeholder="비밀번호 확인">
                <label id="password_check"></label>
            </div>
            <button type="button" class="btn-submit" onclick="registercheck()" name="btn_register" id="btn_register">회원가입</button>
        </form>
        <div class="register-login-link">
            이미 계정이 있으신가요? <a th:href="@{/user/login}">로그인</a>
        </div>
    </div>
</div>
</body>
</html>
