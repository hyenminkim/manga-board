<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" th:href="@{/css/common.css}">
    <title>로그인</title>
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f0 100%);
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            padding: 48px 40px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 8px;
        }
        .login-logo a {
            font-size: 32px;
            font-weight: 900;
            color: var(--color-primary);
            text-decoration: none;
            letter-spacing: -1px;
        }
        .login-desc {
            text-align: center;
            color: var(--color-text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .login-card .form-group {
            margin-bottom: 16px;
        }
        .login-card label {
            font-size: 13px;
            font-weight: 700;
            color: var(--color-text-secondary);
            margin-bottom: 6px;
            display: block;
        }
        .login-card input[type="text"],
        .login-card input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--color-border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: var(--color-bg-input);
            transition: all 0.25s ease;
            outline: none;
        }
        .login-card input:focus {
            border-color: var(--color-primary);
            background: #fff;
            box-shadow: 0 0 0 4px var(--color-primary-light);
        }
        .login-remember {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0 24px;
            font-size: 14px;
            color: var(--color-text-secondary);
        }
        .login-remember input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--color-primary);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--color-primary-gradient);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(13,104,50,0.2);
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(13,104,50,0.3);
        }
        .btn-register {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-top: 12px;
        }
        .btn-register:hover {
            background: var(--color-primary-light);
            color: var(--color-primary);
        }
        .login-error {
            color: var(--color-danger);
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--color-text-muted);
        }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <a th:href="@{/managa/list}">Managa</a>
        </div>
        <p class="login-desc">만화 아카이브에 오신 것을 환영합니다</p>

        <div class="login-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="@{/user/login}" method="POST">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" name="username" id="username" th:value="${username}" placeholder="아이디를 입력하세요" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" name="password" id="password" placeholder="비밀번호를 입력하세요" required>
            </div>
            <label class="login-remember">
                <input type="checkbox" value="remember-me"> 로그인 상태 유지
            </label>
            <button class="btn-login" type="submit">로그인</button>
            <a class="btn-register" th:href="@{/user/register}">회원가입</a>
        </form>
        <div class="login-footer">&copy; 2024 Managa</div>
    </div>
</div>
</body>
</html>
